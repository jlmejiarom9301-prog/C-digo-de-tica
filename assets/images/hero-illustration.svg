<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Ilustración corporativa abstracta de edificio y circuitos de confianza">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12294d"/>
      <stop offset="100%" stop-color="#061225"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#skyGrad)"/>
  <circle cx="620" cy="150" r="220" fill="none" stroke="#c9a227" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="620" cy="150" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="620" cy="150" r="90" fill="none" stroke="#c9a227" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- corporate towers silhouette -->
  <g fill="#1b3a6b">
    <rect x="60" y="240" width="70" height="220"/>
    <rect x="150" y="180" width="90" height="280"/>
    <rect x="260" y="220" width="60" height="240"/>
    <rect x="340" y="140" width="100" height="320"/>
    <rect x="460" y="200" width="70" height="260"/>
  </g>
  <g fill="#c9a227" opacity="0.85">
    <rect x="75" y="255" width="12" height="14"/>
    <rect x="100" y="255" width="12" height="14"/>
    <rect x="75" y="285" width="12" height="14"/>
    <rect x="100" y="285" width="12" height="14"/>
    <rect x="170" y="200" width="12" height="14"/>
    <rect x="200" y="200" width="12" height="14"/>
    <rect x="170" y="230" width="12" height="14"/>
    <rect x="200" y="230" width="12" height="14"/>
    <rect x="360" y="165" width="12" height="14"/>
    <rect x="390" y="165" width="12" height="14"/>
    <rect x="410" y="165" width="12" height="14"/>
    <rect x="360" y="195" width="12" height="14"/>
    <rect x="390" y="195" width="12" height="14"/>
    <rect x="410" y="195" width="12" height="14"/>
  </g>

  <!-- ground line -->
  <rect x="0" y="460" width="800" height="2" fill="#ffffff" opacity="0.15"/>
</svg>
